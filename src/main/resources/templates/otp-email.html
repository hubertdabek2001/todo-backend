<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Your OTP Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #dddddd;
        }
        .header h1 {
            color: #333333;
        }
        .content {
            padding: 20px 0;
            text-align: center;
        }
        .content p {
            color: #555555;
            font-size: 16px;
            line-height: 1.5;
        }
        .otp-code {
            display: inline-block;
            margin: 20px 0;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            background-color: #007BFF;
            border-radius: 4px;
            letter-spacing: 2px;
        }
        .footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #dddddd;
            color: #999999;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Verification Code</h1>
    </div>
    <div class="content">
        <p>Hello,</p>
        <p>You requested a one-time password (OTP) for verification. Please use the following code to complete your request:</p>
        <div class="otp-code">{{OTP_CODE}}</div>
        <p>This code is valid for 10 minutes. If you did not request this, please ignore this email.</p>
    </div>
    <div class="footer">
        <p>&copy; 2026 TodoList App. All rights reserved.</p>
    </div>
</div>
</body>
</html>
